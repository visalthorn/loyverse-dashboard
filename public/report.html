<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Sales & Marketing Report</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  body.app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 17rem;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    transition: width .2s ease;
  }

  .sidebar-collapsed .sidebar { width: 4.5rem; }
  .sidebar-collapsed .sidebar-header .brand-meta,
  .sidebar-collapsed .sidebar-footer { display: none; }
  .sidebar-collapsed .nav-item { justify-content: center; }
  .sidebar-collapsed .nav-label { display: none; }

  .main-wrapper {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #cbd5e1;
    border-left: 3px solid transparent;
    transition: background-color .15s, color .15s, border-color .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active {
    background: rgba(245,158,11,.12);
    color: #fbbf24;
    border-left-color: #fbbf24;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 50;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 767px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      z-index: 60;
      transition: transform .25s ease;
    }
    .sidebar.sidebar-open { transform: translateX(0); }
  }

  .growth-up   { color: #34d399; font-weight: 600; }
  .growth-down { color: #f87171; font-weight: 600; }
  .growth-nil  { color: #64748b; }
</style>
</head>
<body class="app-shell bg-slate-900 text-white min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar bg-slate-800 border-r border-slate-700">
  <div class="sidebar-header px-5 py-4 border-b border-slate-700 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div id="sidebarAvatar" class="w-9 h-9 rounded-full bg-gradient-to-tr from-amber-400 to-orange-600 flex items-center justify-center font-bold text-black">U</div>
      <div class="brand-meta">
        <div class="flex items-center gap-2">
          <div id="sidebarUserName" class="text-base font-bold text-amber-400">User</div>
        </div>
        <div class="text-xs text-slate-400 flex items-center gap-2">
          <span id="sidebarUserRole">Role</span>
          <button onclick="logout()" title="Sign out"
            style="background:none;border:1px solid #1f2d45;border-radius:8px;padding:6px 10px;color:#64748b;cursor:pointer;font-size:12px;transition:all 0.2s;"
            onmouseover="this.style.color='#f87171';this.style.borderColor='#f87171'"
            onmouseout="this.style.color='#64748b';this.style.borderColor='#1f2d45'">
            <span data-i18n="common.signOut">Sign out</span>
          </button>
        </div>
      </div>
    </div>
    <div id="langSwitcher"></div>
    <button onclick="toggleSidebarCollapse()" class="hidden md:inline-flex text-xl px-2 py-1 rounded hover:bg-slate-700" data-i18n-title="common.collapseSidebar" aria-label="Collapse sidebar">⇔</button>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1">
    <a href="/" class="nav-item">
      <span class="text-lg">📊</span>
      <span class="nav-label" data-i18n="nav.dashboard">Dashboard</span>
    </a>
    <a href="/expenses.html" class="nav-item">
      <span class="text-lg">💸</span>
      <span class="nav-label" data-i18n="nav.expenses">Expenses</span>
    </a>
    <a href="/report.html" class="nav-item active">
      <span class="text-lg">📋</span>
      <span class="nav-label" data-i18n="nav.reports">Reports</span>
    </a>
    <a href="/receipts.html" class="nav-item">
      <span class="text-lg">🧾</span>
      <span class="nav-label" data-i18n="nav.receipts">Receipts</span>
    </a>
    <a href="/staff.html" class="nav-item">
      <span class="text-lg">👥</span>
      <span class="nav-label" data-i18n="nav.staff">Staff</span>
    </a>
    <a href="/users.html" id="navUsers" class="nav-item" style="display:none">
      <span class="text-lg">⚙️</span>
      <span class="nav-label" data-i18n="nav.users">Users</span>
    </a>
  </nav>

  <div class="px-5 py-4 border-t border-slate-700 sidebar-footer">
    <div id="userInfo" class="text-xs text-slate-400"></div>
  </div>
</aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">

  <!-- Top bar -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 md:px-6 py-3 sticky top-0 z-40">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-slate-700" aria-label="Open menu">☰</button>
        <h2 class="text-lg font-semibold">Sales &amp; Marketing Report</h2>
      </div>

      <div class="flex flex-col md:flex-row items-start md:items-center gap-5">
        <div class="period-selector flex gap-1 bg-slate-700 rounded-lg p-1">
          <button onclick="reportSetPeriod('week')"  class="period-btn active" data-period="week">Last 7 days</button>
          <button onclick="reportSetPeriod('month')" class="period-btn" data-period="month">Last Month</button>
          <button onclick="reportSetPeriod('year')"  class="period-btn" data-period="year">Year</button>
          <button onclick="reportSetPeriod('range')" class="period-btn" data-period="range">Custom</button>
        </div>
        <div class="custom-range flex flex-wrap items-center gap-2">
          <label class="text-xs text-slate-300">From <input id="startDate" type="date" class="rounded bg-slate-800 border border-slate-700 text-white text-xs p-1"></label>
          <label class="text-xs text-slate-300">To <input id="endDate" type="date" class="rounded bg-slate-800 border border-slate-700 text-white text-xs p-1"></label>
          <button onclick="reportApplyRange()" class="bg-amber-500 hover:bg-amber-400 text-slate-900 text-xs font-semibold uppercase tracking-wide px-3 py-2 rounded">Apply</button>
        </div>
      </div>
    </div>
  </header>

  <main id="report-page" class="p-4 md:p-6 space-y-6 max-w-screen-2xl mx-auto w-full">

    <!-- Section 1: KPI Summary -->
    <section>
      <div class="flex items-center gap-3 mb-3">
        <span class="kpi-section-lbl">Summary</span>
        <div class="flex-1 h-px" style="background:#1e3448"></div>
      </div>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="reportKpis">
        <div class="kpi-primary kpi-primary--amber skeleton"><div class="h-28 rounded-lg"></div></div>
        <div class="kpi-primary kpi-primary--red skeleton"><div class="h-28 rounded-lg"></div></div>
        <div class="kpi-primary kpi-primary--violet skeleton"><div class="h-28 rounded-lg"></div></div>
        <div class="kpi-primary kpi-primary--emerald skeleton"><div class="h-28 rounded-lg"></div></div>
      </div>
    </section>

    <!-- Section 2: Revenue Trend with Growth % -->
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title">📈 Revenue Trend &amp; Growth</h2>
        <span id="revTrendLabel" class="text-xs text-slate-400"></span>
      </div>
      <div class="chart-container"><canvas id="revTrendChart"></canvas></div>
    </section>

    <!-- Section 3: Channel Mix -->
    <section class="grid md:grid-cols-2 gap-4">
      <div class="card">
        <h2 class="section-title mb-4">🍽️ Dining Channel</h2>
        <div class="chart-container-sm"><canvas id="diningChart"></canvas></div>
        <div id="diningLegend" class="mt-3 space-y-1"></div>
      </div>
      <div class="card">
        <h2 class="section-title mb-4">💳 Payment Method</h2>
        <div class="chart-container-sm"><canvas id="paymentChart"></canvas></div>
        <div id="paymentLegend" class="mt-3 space-y-1"></div>
      </div>
    </section>

    <!-- Section 3b: Top Product Performance -->
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title">🥧 Top Product Performance</h2>
        <div class="flex items-center gap-2">
          <select id="topProductsCategory" class="filter-select" onchange="reportSetTopProductsCategory(this.value)">
            <option value="" selected>All</option>
            <option value="food">Food</option>
            <option value="beverage">Beverage</option>
          </select>
          <select id="topProductsLimit" class="filter-select" onchange="reportSetTopProductsLimit(this.value)">
            <option value="5" selected>Top 5</option>
            <option value="10">Top 10</option>
            <option value="15">Top 15</option>
            <option value="20">Top 20</option>
          </select>
        </div>
      </div>
      <div class="grid md:grid-cols-2 gap-6 items-center">
        <div id="topProductsLegend" class="space-y-3"></div>
        <div class="chart-container"><canvas id="topProductsChart"></canvas></div>
      </div>
    </section>

    <!-- Section 5: Expense Trend -->
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title">💸 Revenue vs Expenses</h2>
        <div id="expenseSummaryChip" class="text-xs text-slate-400"></div>
      </div>
      <div class="chart-container"><canvas id="expenseTrendChart"></canvas></div>
    </section>

    <!-- Section 6: POS Device Performance -->
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title">🖥️ POS Device Performance</h2>
        <span class="text-xs text-slate-400">Revenue · Orders per device · amber = top device</span>
      </div>
      <div class="chart-container"><canvas id="devicePerfChart"></canvas></div>
    </section>

  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
