<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POS Expenses</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  /* ---- App shell / sidebar layout ---- */
  body.app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 17rem;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .main-wrapper {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #cbd5e1; /* slate-300 */
    border-left: 3px solid transparent;
    transition: background-color .15s, color .15s, border-color .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active {
    background: rgba(245, 158, 11, .12); /* amber-500/12 */
    color: #fbbf24; /* amber-400 */
    border-left-color: #fbbf24;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 50;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 767px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      z-index: 60;
      transition: transform .25s ease;
    }
    .sidebar.sidebar-open { transform: translateX(0); }
  }
</style>
</head>
<body class="app-shell bg-slate-900 text-white min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar bg-slate-800 border-r border-slate-700">
  <div class="px-5 py-4 border-b border-slate-700 flex items-center gap-3">
    <span class="text-2xl">📊</span>
    <div>
      <h1 class="text-base font-bold text-amber-400">POS Analytics</h1>
      <p class="text-xs text-slate-400">Expense Manager</p>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1">
    <a href="/" class="nav-item">
      <span class="text-lg">📊</span> Dashboard
    </a>
    <a href="/expenses.html" class="nav-item active">
      <span class="text-lg">💸</span> Expenses
    </a>
  </nav>

  <div class="px-5 py-4 border-t border-slate-700">
    <div id="userInfo" class="text-xs text-slate-400"></div>
  </div>
</aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">

  <!-- Top bar -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 md:px-6 py-3 sticky top-0 z-40 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-slate-700" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold">Expenses</h2>
      <p class="text-xs text-slate-400">Manage expense entries</p>
    </div>
  </header>

  <main class="p-4 md:p-6 max-w-screen-xl mx-auto space-y-6 w-full">
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="section-title">💸 Expenses</h2>
          <p class="text-xs text-slate-400">Add, edit, and review expense records</p>
        </div>
      </div>

      <form id="expenseForm" class="grid md:grid-cols-3 gap-3 mb-4" onsubmit="submitExpense(event)">
        <div>
          <label class="text-xs text-slate-300">Date</label>
          <input id="expenseDate" type="date" required class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div>
          <label class="text-xs text-slate-300">Amount</label>
          <input id="expenseAmount" type="number" step="0.01" required class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div>
          <label class="text-xs text-slate-300">Expense by</label>
          <input id="expenseBy" type="text" required placeholder="Name" class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div class="md:col-span-3">
          <label class="text-xs text-slate-300">Remark</label>
          <textarea id="expenseRemark" placeholder="Optional note" class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2"></textarea>
        </div>
        <div class="md:col-span-3 flex items-center gap-2">
          <button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-semibold px-4 py-2 rounded">Add Expense</button>
          <div id="expenseMsg" class="text-sm text-slate-400"></div>
        </div>
      </form>

      <div>
        <h3 class="text-sm text-slate-400 mb-3">Expenses List</h3>
        <div id="expensesList" class="space-y-2 text-sm text-slate-300"></div>
      </div>
    </section>
  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
</script>
<script src="/js/dashboard.js"></script>
</body>
</html>
