<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>POS Expenses</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  /* ---- App shell / sidebar layout ---- */
  body.app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 17rem;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    transition: width .2s ease;
  }

  .sidebar-collapsed .sidebar {
    width: 4.5rem;
  }

  .sidebar-collapsed .sidebar-header .brand-meta,
  .sidebar-collapsed .sidebar-footer {
    display: none;
  }

  .sidebar-collapsed .nav-item {
    justify-content: center;
  }

  .sidebar-collapsed .nav-label {
    display: none;
  }

  .main-wrapper {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #cbd5e1; /* slate-300 */
    border-left: 3px solid transparent;
    transition: background-color .15s, color .15s, border-color .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active {
    background: rgba(245, 158, 11, .12); /* amber-500/12 */
    color: #fbbf24; /* amber-400 */
    border-left-color: #fbbf24;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 50;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 767px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      z-index: 60;
      transition: transform .25s ease;
    }
    .sidebar.sidebar-open { transform: translateX(0); }
  }
</style>
</head>
<body class="app-shell bg-slate-900 text-white min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar bg-slate-800 border-r border-slate-700">
  <div class="sidebar-header px-5 py-4 border-b border-slate-700 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div id="sidebarAvatar" class="w-9 h-9 rounded-full bg-gradient-to-tr from-amber-400 to-orange-600 flex items-center justify-center font-bold text-black">U</div>
      <div class="brand-meta">
        <div class="flex items-center gap-2">
          <div id="sidebarUserName" class="text-base font-bold text-amber-400">User</div>
        </div>
        <div class="text-xs text-slate-400 flex items-center gap-2">
          <span id="sidebarUserRole">Role</span>
          <button onclick="logout()" title="Sign out"
        style="background:none;border:1px solid #1f2d45;border-radius:8px;padding:6px 10px;color:#64748b;cursor:pointer;font-size:12px;transition:all 0.2s;"
        onmouseover="this.style.color='#f87171';this.style.borderColor='#f87171'"
        onmouseout="this.style.color='#64748b';this.style.borderColor='#1f2d45'"><span data-i18n="common.signOut">Sign out</span></button>
        </div>
      </div>
    </div>
    <div id="langSwitcher"></div>
    <button onclick="toggleSidebarCollapse()" class="hidden md:inline-flex text-xl px-2 py-1 rounded hover:bg-slate-700" data-i18n-title="common.collapseSidebar" aria-label="Collapse sidebar">⇔</button>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1">
    <a href="/" class="nav-item">
      <span class="text-lg">📊</span>
      <span class="nav-label" data-i18n="nav.dashboard">Dashboard</span>
    </a>
    <a href="/expenses.html" class="nav-item active">
      <span class="text-lg">💸</span>
      <span class="nav-label" data-i18n="nav.expenses">Expenses</span>
    </a>
    <a href="/report.html" class="nav-item">
      <span class="text-lg">📋</span>
      <span class="nav-label" data-i18n="nav.reports">Reports</span>
    </a>
    <a href="/receipts.html" class="nav-item">
      <span class="text-lg">🧾</span>
      <span class="nav-label" data-i18n="nav.receipts">Receipts</span>
    </a>
    <a href="/staff.html" class="nav-item">
      <span class="text-lg">👥</span>
      <span class="nav-label" data-i18n="nav.staff">Staff</span>
    </a>
    <a href="/users.html" id="navUsers" class="nav-item" style="display:none">
      <span class="text-lg">⚙️</span>
      <span class="nav-label" data-i18n="nav.users">Users</span>
    </a>
  </nav>

  <div class="px-5 py-4 border-t border-slate-700 sidebar-footer">
    <div id="userInfo" class="text-xs text-slate-400"></div>
  </div>
</aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">

  <!-- Top bar -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 md:px-6 py-3 sticky top-0 z-40 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-slate-700" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold" data-i18n="expenses.title">Expenses</h2>
      <p class="text-xs text-slate-400" data-i18n="expenses.subtitle">Manage expense entries</p>
    </div>
  </header>

  <main class="p-4 md:p-6 max-w-screen-xl mx-auto space-y-6 w-full">
    <section class="card">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="section-title">💸 Expenses</h2>
          <p class="text-xs text-slate-400" data-i18n="expenses.listSubtitle">Add, edit, and review expense records</p>
        </div>
      </div>

      <form id="expenseForm" data-write-page="expenses" class="grid md:grid-cols-3 gap-3 mb-4" onsubmit="submitExpense(event)">
        <div>
          <label class="text-xs text-slate-300" data-i18n="expenses.date">Date</label>
          <input id="expenseDate" type="date" required class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div>
          <label class="text-xs text-slate-300" data-i18n="expenses.amount">Amount</label>
          <input id="expenseAmount" type="number" step="0.01" required class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div>
          <label class="text-xs text-slate-300" data-i18n="expenses.expenseBy">Expense by</label>
          <input id="expenseBy" type="text" required placeholder="Name" data-i18n-placeholder="expenses.expenseByPlaceholder" class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
        </div>
        <div class="md:col-span-3">
          <label class="text-xs text-slate-300" data-i18n="expenses.remark">Remark</label>
          <textarea id="expenseRemark" placeholder="Optional note" data-i18n-placeholder="expenses.remarkPlaceholder" class="w-full rounded bg-slate-800 border border-slate-700 text-white text-sm p-2"></textarea>
        </div>
        <div class="md:col-span-3 flex items-center gap-2">
          <button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-semibold px-4 py-2 rounded" data-i18n="expenses.addButton">Add Expense</button>
          <div id="expenseMsg" class="text-sm text-slate-400"></div>
        </div>
      </form>

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-3">
        <div class="flex flex-wrap items-center gap-3">
          <h2 class="section-title" data-i18n="expenses.listTitle">💸 Expenses List</h2>
          <!--<span id="expensesSummaryTotalItem" class="text-sm text-amber-300">0</span> items · Total: <span id="expensesSummaryTotalAmount" class="text-sm text-red-300">៛0.00</span>-->
          <span id="expensesSummary" class="text-sm text-slate-300"><span class="text-sm text-amber-600 font-bold">0</span> items · Total: <span class="text-sm text-amber-600 font-bold">៛0.00</span></span>
        </div>
        <div class="flex flex-wrap items-center gap-2 text-xs text-slate-300">
          <label for="expensesStartDate" class="text-slate-400" data-i18n="expenses.start">Start</label>
          <input id="expensesStartDate" type="date" class="rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
          <label for="expensesEndDate" class="text-slate-400" data-i18n="expenses.end">End</label>
          <input id="expensesEndDate" type="date" class="rounded bg-slate-800 border border-slate-700 text-white text-sm p-2" />
          <button onclick="exportExpensesCSV()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold px-3 py-2 rounded flex items-center gap-1"><span data-i18n="common.csv">⬇ CSV</span></button>
          <!--<button id="expensesFilterBtn" type="button" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold px-3 py-2 rounded">Apply</button>
          <button id="expensesClearBtn" type="button" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold px-3 py-2 rounded">Clear</button>-->
        </div>
      </div>
      <div id="expensesList" class="space-y-2 text-sm text-slate-300"></div>
    </section>
  </main>
</div>

<script>
  /* ===========================
     Sidebar helpers
  =========================== */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
