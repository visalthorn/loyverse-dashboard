<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Loyverse Sync</title>
<script>
  (function() {
    var t = localStorage.getItem('pos_theme') === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    document.documentElement.classList.toggle('dark', t === 'dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
  .section-title { font-size: 0.9375rem; font-weight: 700; color: var(--text-primary); }
  .field-input {
    background: var(--bg-canvas); border: 1px solid var(--border); border-radius: 0.5rem;
    color: var(--text-primary); font-size: 0.8125rem; padding: 0.5rem 0.75rem;
    transition: border-color .15s; outline: none; width: 100%;
  }
  .field-input:focus { border-color: var(--accent-strong); }
  .field-input::placeholder { color: var(--text-dim); }
  .field-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge { display: inline-flex; align-items: center; padding: 0.1875rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
</style>
</head>
<body class="app-shell min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar"></aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">
  <header class="app-header px-4 md:px-6 py-3 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-[color:var(--hover-tint)]" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold" data-i18n="sync.title">Loyverse Sync</h2>
      <p class="text-xs text-[color:var(--text-secondary)]" data-i18n="sync.subtitle">All Loyverse data syncs in one place</p>
    </div>
    <div class="flex-1"></div>
    <button onclick="logout()" class="header-signout" data-i18n-title="common.signOut" aria-label="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </header>

  <main class="p-4 md:p-6 space-y-6 w-full max-w-screen-xl mx-auto">

    <div id="syncCards" class="grid md:grid-cols-2 gap-4">
      <!-- Gross Income card -->
      <div class="card">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="section-title" data-i18n="sync.receiptsCard">🧾 Gross Income (Receipts)</h2>
            <p class="text-xs text-[color:var(--text-secondary)] mt-1" data-i18n="sync.receiptsCardSub">Pulls yesterday's receipts from Loyverse</p>
          </div>
          <button id="syncReceiptsBtn" onclick="syncReceipts()" class="btn-accent flex-shrink-0" data-write-page="receipts" data-i18n="sync.syncNow">Sync Now</button>
        </div>
        <div id="receiptsLastSync" class="text-xs text-[color:var(--text-secondary)] mt-3"></div>
      </div>

      <!-- Items & Categories card -->
      <div class="card">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="section-title" data-i18n="sync.itemsCard">🏷️ Items &amp; Categories</h2>
            <p class="text-xs text-[color:var(--text-secondary)] mt-1" data-i18n="sync.itemsCardSub">Pulls the full item catalog from Loyverse</p>
          </div>
          <button id="syncItemsBtn" onclick="syncItemsNow()" class="btn-accent flex-shrink-0" data-write-page="items" data-i18n="sync.syncNow">Sync Now</button>
        </div>
        <div id="itemsLastSync" class="text-xs text-[color:var(--text-secondary)] mt-3"></div>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <h2 class="section-title mb-4" data-i18n="sync.historyTitle">🕘 Sync History</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-left text-xs">
              <th class="pb-2 pr-3 font-medium" data-i18n="sync.thType">Type</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="sync.thDate">Date</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="sync.thStatus">Status</th>
              <th class="pb-2 pr-3 font-medium text-right" data-i18n="sync.thRecords">Records</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="sync.thBy">Triggered by</th>
              <th class="pb-2 font-medium" data-i18n="sync.thError">Error</th>
            </tr>
          </thead>
          <tbody id="syncHistoryBody">
            <tr><td colspan="6" class="py-10 text-center text-[color:var(--text-secondary)]" data-i18n="common.loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
