<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>User Management</title>
<script>
  (function() {
    var t = localStorage.getItem('pos_theme') === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    document.documentElement.classList.toggle('dark', t === 'dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
  .section-title { font-size: 0.9375rem; font-weight: 700; color: var(--text-primary); }
  .field-input {
    background: var(--bg-canvas); border: 1px solid var(--border); border-radius: 0.5rem;
    color: var(--text-primary); font-size: 0.8125rem; padding: 0.5rem 0.75rem;
    transition: border-color .15s; outline: none; width: 100%;
  }
  .field-input:focus { border-color: var(--accent-strong); }
  .field-input::placeholder { color: var(--text-dim); }
  .field-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge { display: inline-flex; align-items: center; padding: 0.1875rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
</style>
</head>
<body class="app-shell min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar"></aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">
  <header class="app-header px-4 md:px-6 py-3 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-[color:var(--hover-tint)]" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold" data-i18n="users.title">User Management</h2>
      <p class="text-xs text-[color:var(--text-secondary)]" data-i18n="users.subtitle">Manage users and role permissions</p>
    </div>
    <div class="flex-1"></div>
    <button onclick="logout()" class="header-signout" data-i18n-title="common.signOut" aria-label="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </header>

  <main class="p-4 md:p-6 space-y-6 w-full max-w-screen-xl mx-auto">

    <!-- Add / Edit User Form -->
    <div class="card">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title">👤 <span id="userFormTitle" data-i18n="users.addTitle">Add User</span></h2>
        <button id="userFormCancelBtn" onclick="cancelEditUser()" class="hidden text-xs text-[color:var(--text-secondary)] hover:text-[color:var(--accent-strong)] border border-[color:var(--border-strong)] hover:border-[color:var(--accent)] px-3 py-1 rounded transition-colors" data-i18n="common.cancel">Cancel Edit</button>
      </div>
      <form id="userForm" onsubmit="submitUser(event)" class="grid md:grid-cols-3 gap-3">
        <div>
          <label class="text-xs text-[color:var(--text-secondary)] mb-1 block"><span data-i18n="users.fieldUsername">Username</span> <span class="text-[color:var(--loss)]">*</span></label>
          <input id="userUsername" type="text" required data-i18n-placeholder="users.usernamePlaceholder" placeholder="e.g. john" class="field-input"/>
        </div>
        <div>
          <label class="text-xs text-[color:var(--text-secondary)] mb-1 block" data-i18n="users.fieldFullName">Full Name</label>
          <input id="userFullName" type="text" data-i18n-placeholder="users.fullNamePlaceholder" placeholder="Full name" class="field-input"/>
        </div>
        <div>
          <label class="text-xs text-[color:var(--text-secondary)] mb-1 block"><span data-i18n="users.fieldEmail">Email</span> <span class="text-[color:var(--loss)]">*</span></label>
          <input id="userEmail" type="email" required data-i18n-placeholder="users.emailPlaceholder" placeholder="user@example.com" class="field-input"/>
        </div>
        <div>
          <label class="text-xs text-[color:var(--text-secondary)] mb-1 block"><span data-i18n="users.fieldRole">Role</span> <span class="text-[color:var(--loss)]">*</span></label>
          <select id="userRole" required class="field-input">
            <option value="manager" data-i18n="users.roleManager">Manager</option>
            <option value="admin" data-i18n="users.roleAdmin">Admin</option>
          </select>
        </div>
        <div>
          <label id="userPasswordLabel" class="text-xs text-[color:var(--text-secondary)] mb-1 block"><span data-i18n="users.fieldPassword">Password</span> <span class="text-[color:var(--loss)]">*</span></label>
          <input id="userPassword" type="password" data-i18n-placeholder="users.passwordPlaceholder" placeholder="Password" class="field-input"/>
        </div>
        <div class="md:col-span-3 flex items-center gap-3 pt-1">
          <button type="submit" class="btn-accent">
            <span id="userSubmitLabel" data-i18n="users.createUser">Create User</span>
          </button>
          <span id="userMsg" class="text-sm text-[color:var(--text-secondary)]"></span>
        </div>
      </form>
    </div>

    <!-- Users List -->
    <div class="card">
      <h2 class="section-title mb-4" data-i18n="users.usersListTitle">📋 Users</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-left text-xs">
              <th class="pb-2 pr-3 font-medium" data-i18n="users.thIndex">#</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="users.thUsername">Username</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="users.thFullName">Full Name</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="users.thEmail">Email</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="users.thRole">Role</th>
              <th class="pb-2 pr-3 font-medium text-center" data-i18n="users.thStatus">Status</th>
              <th class="pb-2 font-medium text-center" data-i18n="users.thActions">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="7" class="py-10 text-center text-[color:var(--text-secondary)]" data-i18n="users.loadingRow">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Permissions Matrix -->
    <div class="card">
      <div class="mb-4">
        <h2 class="section-title" data-i18n="users.permissionsTitle">🔐 Role Permissions</h2>
        <p class="text-xs text-[color:var(--text-secondary)] mt-1" data-i18n="users.permissionsSubtitle">Toggle write access per page for Manager role. Admin always has full access.</p>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-xs">
              <th class="pb-2 pr-4 font-medium text-left" data-i18n="users.thPage">Page</th>
              <th class="pb-2 pr-4 font-medium text-center" data-i18n="users.thAdminWrite">Admin (Write)</th>
              <th class="pb-2 font-medium text-center" data-i18n="users.thManagerWrite">Manager (Write)</th>
            </tr>
          </thead>
          <tbody id="permissionsMatrixBody">
            <tr><td colspan="3" class="py-10 text-center text-[color:var(--text-secondary)]" data-i18n="users.loadingRow">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
