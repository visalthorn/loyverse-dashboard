<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>POS Receipts</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  /* ---- Receipt layout ---- */
  .receipts-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1.25rem;
    align-items: start;
  }
  @media (max-width: 1023px) {
    .receipts-layout { grid-template-columns: 1fr; }
    .detail-panel { display: none; }
    .detail-panel.active { display: block; }
  }

  /* ---- Table rows ---- */
  .receipt-row {
    cursor: pointer;
    transition: background .12s;
  }
  .receipt-row:hover td { background: rgba(255,255,255,.04); }
  .receipt-row.selected td { background: rgba(245,158,11,.08); }
  .receipt-row.selected td:first-child { border-left: 3px solid #fbbf24; }

  /* ---- Stat cards ---- */
  .stat-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 0.75rem;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.875rem;
  }
  .stat-icon {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* ---- Detail panel ---- */
  .detail-panel {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 0.75rem;
    position: sticky;
    top: 5rem;
    overflow: hidden;
  }
  .detail-header {
    background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%);
    padding: 1.25rem;
    border-bottom: 1px solid #334155;
  }
  .detail-item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0.625rem 0;
    border-bottom: 1px solid #1e293b;
    font-size: 0.8125rem;
    gap: 0.5rem;
  }
  .detail-item-row:last-child { border-bottom: none; }
  .detail-item-name { color: #cbd5e1; flex: 1; }
  .detail-item-price { color: #f8fafc; font-weight: 600; white-space: nowrap; }
  .detail-item-qty { color: #64748b; font-size: 0.75rem; }

  /* ---- Pagination ---- */
  .page-btn {
    width: 2rem;
    height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0.375rem;
    font-size: 0.8125rem;
    transition: background .12s, color .12s;
    cursor: pointer;
    color: #94a3b8;
    border: 1px solid transparent;
  }
  .page-btn:hover { background: #1e293b; color: #f8fafc; }
  .page-btn.active { background: rgba(245,158,11,.18); color: #fbbf24; border-color: #fbbf24; font-weight: 700; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ---- Filter bar ---- */
  .filter-input {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 0.5rem;
    color: #f8fafc;
    font-size: 0.8125rem;
    padding: 0.5rem 0.75rem;
    transition: border-color .15s;
    outline: none;
  }
  .filter-input:focus { border-color: #fbbf24; }
  .filter-input::placeholder { color: #475569; }

  /* ---- Badge ---- */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.1875rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
  .badge-sale { background: rgba(34,197,94,.12); color: #4ade80; }
  .badge-refund { background: rgba(239,68,68,.12); color: #f87171; }
  .badge-canceled { background: rgba(100,116,139,.14); color: #94a3b8; }

  /* ---- Empty / loading ---- */
  .empty-state { padding: 2.5rem 1rem; text-align: center; color: #475569; }

  /* ---- Scrollbar ---- */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }

  /* ---- Card ---- */
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 0.75rem;
    padding: 1.25rem;
  }
  .section-title { font-size: 0.9375rem; font-weight: 700; color: #f8fafc; }
</style>
</head>
<body class="app-shell bg-slate-900 text-white min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar bg-slate-800 border-r border-slate-700"></aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">

  <!-- Top bar -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 md:px-6 py-3 sticky top-0 z-40 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-slate-700" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold" data-i18n="receipts.title">Receipts</h2>
      <p class="text-xs text-slate-400" data-i18n="receipts.subtitle">View and search receipt records</p>
    </div>
  </header>

  <main class="p-4 md:p-6 space-y-5 w-full max-w-screen-xl mx-auto">

    <!-- Summary stats -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon bg-slate-700">🧾</div>
        <div>
          <div class="text-xs text-slate-400 mb-0.5" data-i18n="receipts.statAllReceipts">All Receipts</div>
          <div class="text-2xl font-bold text-white" id="statTotal">—</div>
          <div class="text-xs text-slate-400 mt-0.5" id="statTotalAmount">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(34,197,94,.12)">🟢</div>
        <div>
          <div class="text-xs text-slate-400 mb-0.5" data-i18n="receipts.statSales">Sales</div>
          <div class="text-2xl font-bold text-emerald-400" id="statSales">—</div>
          <div class="text-xs text-emerald-600 mt-0.5" id="statSalesAmount">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(239,68,68,.12)">🔴</div>
        <div>
          <div class="text-xs text-slate-400 mb-0.5" data-i18n="receipts.statRefunds">Refunds</div>
          <div class="text-2xl font-bold text-red-400" id="statRefunds">—</div>
          <div class="text-xs text-red-700 mt-0.5" id="statRefundsAmount">—</div>
        </div>
      </div>
    </div>

    <!-- Main two-column layout -->
    <div class="receipts-layout">

      <!-- Left: list + filters -->
      <div class="space-y-4">

        <!-- Filter bar -->
        <div class="card">
          <div class="flex flex-wrap gap-3 items-end">
            <!-- Search -->
            <div class="flex-1 min-w-[180px]">
              <label class="block text-xs text-slate-400 mb-1" data-i18n="receipts.search">Search</label>
              <div class="relative">
                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
                <input id="searchInput" type="text" placeholder="Receipt no., employee…" data-i18n-placeholder="receipts.searchPlaceholder" class="filter-input w-full pl-8" oninput="onSearchChange()"/>
              </div>
            </div>
            <!-- Start date -->
            <div>
              <label class="block text-xs text-slate-400 mb-1" data-i18n="receipts.from">From</label>
              <input id="filterStart" type="date" class="filter-input" onchange="onApiFilterChange()"/>
            </div>
            <!-- End date -->
            <div>
              <label class="block text-xs text-slate-400 mb-1" data-i18n="receipts.to">To</label>
              <input id="filterEnd" type="date" class="filter-input" onchange="onApiFilterChange()"/>
            </div>
            <!-- Type -->
            <div>
              <label class="block text-xs text-slate-400 mb-1" data-i18n="receipts.type">Type</label>
              <select id="filterType" class="filter-input" onchange="onApiFilterChange()">
                <option value="" data-i18n="receipts.typeAll">All</option>
                <option value="SALE" data-i18n="receipts.typeSale">Sale</option>
                <option value="REFUND" data-i18n="receipts.typeRefund">Refund</option>
              </select>
            </div>
            <!-- Reset -->
            <button onclick="resetFilters()" class="filter-input text-slate-400 hover:text-amber-400 hover:border-amber-400 transition-colors px-3 cursor-pointer" data-i18n="common.reset">Reset</button>
          </div>
        </div>

        <!-- Table -->
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h2 class="section-title" data-i18n="receipts.listTitle">🧾 Receipts List</h2>
            <div class="flex items-center gap-3">
              <span class="text-xs text-slate-400" id="resultCount">—</span>
              <button onclick="exportReceiptsCSV()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold px-3 py-1.5 rounded flex items-center gap-1"><span data-i18n="common.csv">⬇ CSV</span></button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-slate-400 border-b border-slate-700 text-left">
                  <th class="pb-2 pr-3 font-medium" data-i18n="receipts.thIndex">#</th>
                  <th class="pb-2 pr-3 font-medium" data-i18n="receipts.thReceiptNo">Receipt No.</th>
                  <th class="pb-2 pr-3 font-medium" data-i18n="receipts.thOrder">Order</th>
                  <th class="pb-2 pr-3 font-medium" data-i18n="receipts.thDate">Date</th>
                  <th class="pb-2 pr-3 font-medium" data-i18n="receipts.thPosDevice">Pos Device</th>
                  <th class="pb-2 pr-3 font-medium text-center" data-i18n="receipts.thType">Type</th>
                  <th class="pb-2 pr-3 font-medium text-center" data-i18n="receipts.thCanceled">Is Canceled</th>
                  <th class="pb-2 font-medium text-right" data-i18n="receipts.thTotal">Total</th>
                </tr>
              </thead>
              <tbody id="receiptsTbody">
                <tr><td colspan="8" class="empty-state" data-i18n="receipts.loading">Loading…</td></tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-700">
            <span class="text-xs text-slate-500" id="pageInfo">Page 1</span>
            <div class="flex items-center gap-1" id="paginationControls"></div>
          </div>
        </div>

      </div><!-- /left -->

      <!-- Right: Detail panel -->
      <div class="detail-panel" id="detailPanel">
        <div id="detailEmpty" class="empty-state py-16">
          <div class="text-3xl mb-2">🧾</div>
          <div class="text-sm" data-i18n="receipts.selectPrompt">Select a receipt to view details</div>
        </div>
        <div id="detailContent" class="hidden">
          <!-- filled by JS -->
        </div>
      </div>

    </div><!-- /receipts-layout -->
  </main>
</div><!-- /main-wrapper -->

<script>
  /* ===========================
     Sidebar helpers
  =========================== */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }

  /* init handled by DOMContentLoaded in dashboard.js */
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
