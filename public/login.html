<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css"/>
<title>POS Dashboard — Sign In</title>
<script>
  (function() {
    var t = localStorage.getItem('pos_theme') === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
  })();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-canvas);
    font-family: var(--font-sans);
    color: var(--text-primary);
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0%   { background-position: 0 0; }
    100% { background-position: 48px 48px; }
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: rgba(245,158,11,0.12);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: rgba(59,130,246,0.08);
    bottom: -80px; right: -80px;
    animation-delay: -4s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(30px, 20px); }
  }

  /* Layout */
  .page {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,158,11,0.06);
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #D97706);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(245,158,11,0.3);
  }
  .logo-text h1 {
    font-family: var(--font-num);
    font-weight: 600;
    letter-spacing: 0.02em;
    font-size: 17px;
    color: var(--accent);
    line-height: 1.1;
  }
  .logo-text p {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* Form */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 15px;
    pointer-events: none;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--bg-canvas);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 12px 40px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input::placeholder { color: var(--text-dim); }

  .toggle-pw {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-secondary); cursor: pointer;
    font-size: 15px; padding: 4px;
    transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--accent); }

  /* Error */
  .error-msg {
    display: none;
    background: var(--loss-soft);
    border: 1px solid color-mix(in srgb, var(--loss) 35%, transparent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--loss);
    margin-bottom: 18px;
    animation: shake 0.4s ease;
  }
  .error-msg.show { display: flex; align-items: center; gap: 8px; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-6px); }
    40%,80%  { transform: translateX(6px); }
  }

  /* Submit button */
  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent-contrast);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
    margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover  { opacity: 0.92; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(11,17,32,0.3);
    border-top-color: #0B1120;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    height: 0;
    border-top: 1px dashed var(--border-strong);
    margin: 28px 0;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .footer-note span { color: var(--accent); }

  /* Language switcher styles come from style.css */
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">📊</div>
      <div class="logo-text">
        <h1 data-i18n="login.title">Dashboard Analytics</h1>
        <p data-i18n="login.subtitle">Dashboard Portal</p>
      </div>
      <div id="langSwitcher" style="margin-left:auto;"></div>
    </div>

    <h2 class="page-title" data-i18n="login.welcome">Welcome back</h2>
    <p class="page-sub" data-i18n="login.instructions">Sign in to access your analytics dashboard</p>

    <div class="error-msg" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText" data-i18n="login.errorDefault">Invalid username or password.</span>
    </div>

    <div class="field">
      <label data-i18n="login.username">Username</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="username" data-i18n-placeholder="login.usernamePlaceholder" placeholder="Enter your username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label data-i18n="login.password">Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pw" onclick="togglePassword()" id="toggleBtn" type="button">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText" data-i18n="login.signIn">Sign In</span>
    </button>

    <div class="divider"></div>
    <p class="footer-note"><span data-i18n="login.footer">Dashboard Analytics © 2026</span> &nbsp;·&nbsp; <span>Chab Mouth</span></p>

  </div>
</div>

<script type="module">
  import { applyTranslations, renderLangSwitcher, t } from '/js/i18n.js';
  window.t = t;
  applyTranslations();
  renderLangSwitcher(document.getElementById('langSwitcher'));
</script>

<script>
// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function togglePassword() {
  const pw  = document.getElementById('password');
  const btn = document.getElementById('toggleBtn');
  if (pw.type === 'password') { pw.type = 'text';     btn.textContent = '🙈'; }
  else                         { pw.type = 'password'; btn.textContent = '👁'; }
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn      = document.getElementById('loginBtn');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');

  // Basic validation
  errorMsg.classList.remove('show');
  if (!username || !password) {
    showError(window.t('login.errorMissingFields'));
    return;
  }

  // Loading state
  btn.disabled      = true;
  spinner.style.display = 'block';
  btnText.textContent   = window.t('login.signingIn');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok && data.token) {
      // Save token and user info
      localStorage.setItem('pos_token', data.token);
      localStorage.setItem('pos_user',  JSON.stringify(data.user));
      // Redirect to dashboard
      window.location.href = '/';
    } else {
      showError(data.message || window.t('login.errorDefault'));
    }
  } catch (err) {
    showError(window.t('login.errorConnection'));
  } finally {
    btn.disabled          = false;
    spinner.style.display = 'none';
    btnText.textContent   = window.t('login.signIn');
  }
}

function showError(msg) {
  const errorMsg  = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  errorMsg.classList.add('show');
}
</script>

</body>
</html>
