<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Items Management</title>
<script>
  (function() {
    var t = localStorage.getItem('pos_theme') === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    document.documentElement.classList.toggle('dark', t === 'dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
  .section-title { font-size: 0.9375rem; font-weight: 700; color: var(--text-primary); }
  .field-input {
    background: var(--bg-canvas); border: 1px solid var(--border); border-radius: 0.5rem;
    color: var(--text-primary); font-size: 0.8125rem; padding: 0.5rem 0.75rem;
    transition: border-color .15s; outline: none; width: 100%;
  }
  .field-input:focus { border-color: var(--accent-strong); }
  .field-input::placeholder { color: var(--text-dim); }
  .field-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge { display: inline-flex; align-items: center; padding: 0.1875rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
</style>
</head>
<body class="app-shell min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="sidebar"></aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main-wrapper">
  <header class="app-header px-4 md:px-6 py-3 flex items-center gap-3">
    <button onclick="toggleSidebar()" class="md:hidden text-xl px-2 py-1 rounded hover:bg-[color:var(--hover-tint)]" aria-label="Open menu">☰</button>
    <div>
      <h2 class="text-lg font-semibold" data-i18n="items.title">Items Management</h2>
      <p class="text-xs text-[color:var(--text-secondary)]" data-i18n="items.subtitle">Items and categories synced from Loyverse</p>
    </div>
    <div class="flex-1"></div>
    <button onclick="logout()" class="header-signout" data-i18n-title="common.signOut" aria-label="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </header>

  <main class="p-4 md:p-6 space-y-6 w-full max-w-screen-xl mx-auto">

    <!-- Filters -->
    <div class="card">
      <div class="flex flex-wrap items-center gap-3">
        <input id="itemSearch" type="text" oninput="onItemSearch()" class="field-input" style="max-width:260px"
               data-i18n-placeholder="items.searchPlaceholder" placeholder="Search name or SKU…"/>
        <select id="itemCategoryFilter" onchange="onItemFilterChange()" class="field-input" style="max-width:220px"></select>
        <label class="flex items-center gap-2 text-xs text-[color:var(--text-secondary)] cursor-pointer">
          <input id="showDeletedToggle" type="checkbox" onchange="onItemFilterChange()"/>
          <span data-i18n="items.showDeleted">Show deleted items</span>
        </label>
        <div class="flex-1"></div>
        <button onclick="toggleCategoriesPanel()" class="text-xs border border-[color:var(--border-strong)] px-3 py-1.5 rounded hover:border-[color:var(--accent)] transition-colors" data-i18n="items.categoriesToggle">Manage categories</button>
        <button onclick="toggleReportCategoriesPanel()" class="text-xs border border-[color:var(--border-strong)] px-3 py-1.5 rounded hover:border-[color:var(--accent)] transition-colors" data-i18n="items.reportCategoriesToggle">Manage report categories</button>
      </div>

      <!-- Categories panel (hidden by default) -->
      <div id="categoriesPanel" class="hidden mt-4 border-t border-[color:var(--border)] pt-4">
        <table class="w-full text-sm" style="max-width:560px">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-left text-xs">
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thCategory">Category</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thLoyverseName">Loyverse name</th>
              <th class="pb-2 font-medium text-center" data-write-page="items" data-i18n="items.thActions">Actions</th>
            </tr>
          </thead>
          <tbody id="categoriesTableBody"></tbody>
        </table>
      </div>

      <!-- Report categories panel (hidden by default) -->
      <div id="reportCategoriesPanel" class="hidden mt-4 border-t border-[color:var(--border)] pt-4">
        <div class="flex items-center gap-2 mb-3" data-write-page="items">
          <input id="newReportCategoryName" type="text" class="field-input" style="max-width:220px" data-i18n-placeholder="items.reportCategoryNamePlaceholder" placeholder="New report category name"/>
          <button onclick="createReportCategory()" class="btn-accent" data-i18n="items.reportCategoryCreate">Add</button>
        </div>
        <table class="w-full text-sm" style="max-width:560px">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-left text-xs">
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thReportCategory">Report category</th>
              <th class="pb-2 font-medium text-center" data-write-page="items" data-i18n="items.thActions">Actions</th>
            </tr>
          </thead>
          <tbody id="reportCategoriesTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Items table -->
    <div class="card">
      <h2 class="section-title mb-4"><span data-i18n="items.listTitle">🏷️ Items</span> <span id="itemCount" class="text-xs font-normal text-[color:var(--text-secondary)]"></span></h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-[color:var(--text-secondary)] border-b border-[color:var(--border)] text-left text-xs">
              <th class="pb-2 pr-3 font-medium"></th>
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thName">Item</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thSku">SKU</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thCategory">Category</th>
              <th class="pb-2 pr-3 font-medium" data-i18n="items.thReportCategory">Report category</th>
              <th class="pb-2 pr-3 font-medium text-right" data-i18n="items.thPrice">Price</th>
              <th class="pb-2 font-medium text-center" data-write-page="items" data-i18n="items.thActions">Actions</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody">
            <tr><td colspan="7" class="py-10 text-center text-[color:var(--text-secondary)]" data-i18n="common.loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Rename modal -->
    <div id="renameModal" class="hidden" style="position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;">
      <div class="card" style="width:min(420px,90vw);">
        <h3 id="renameTitle" class="section-title mb-3" data-i18n="items.renameTitle">Rename</h3>
        <form onsubmit="submitRename(event)">
          <label class="text-xs text-[color:var(--text-secondary)] mb-1 block" data-i18n="items.customNameLabel">Custom name</label>
          <input id="renameInput" type="text" class="field-input" data-i18n-placeholder="items.customNamePlaceholder" placeholder="Leave empty to use Loyverse name"/>
          <p id="renameLoyverseName" class="text-xs text-[color:var(--text-muted)] mt-2"></p>
          <div class="flex items-center gap-2 mt-4">
            <button type="submit" class="btn-accent" data-i18n="items.save">Save</button>
            <button type="button" onclick="closeRename()" class="text-xs border border-[color:var(--border-strong)] px-3 py-1.5 rounded" data-i18n="common.cancel">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>

  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
  }
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
